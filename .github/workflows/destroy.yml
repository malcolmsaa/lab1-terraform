name: Destroy

on:
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -var="project_id=chas-devsecops-2026" -var="region=europe-west1" -var="student_id=malcolm"
